services:
  backend:
    build: ./backend
    environment:
      - CORS_ORIGIN=http://localhost:3000
      - MAX_HISTORY=50
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
